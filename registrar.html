<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
    <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: linear-gradient(135deg, #111827, #1f2937);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .admission-form{
      width: 100%;
      max-width: 850px;
      background: #fff;
      padding: 40px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .admission-form h1{
      text-align: center;
      margin-bottom: 30px;
      color: #111827;
      font-size: 32px;
    }

    form{
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    p{
      font-weight: bold;
      color: #374151;
      margin-bottom: 5px;
    }

    input,
    textarea,
    select{
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      outline: none;
      transition: 0.3s;
      font-size: 15px;
    }

    input:focus,
    textarea:focus,
    select:focus{
      border-color: #2563eb;
      box-shadow: 0 0 8px rgba(37, 99, 235, 0.3);
    }

    textarea{
      resize: none;
      height: 120px;
    }

    .name-group{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .radio-group,
    .checkbox-group{
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 8px;
    }

    .radio-group label,
    .checkbox-group label{
      display: flex;
      align-items: center;
      gap: 6px;
      color: #374151;
    }

    fieldset{
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
    }

    legend{
      padding: 0 10px;
      font-weight: bold;
      color: #ff3c00;
    }

    .buttons{
      display: flex;
      gap: 15px;
      margin-top: 10px;
    }

    button{
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button[type="submit"]{
      background: #ff3c00;
      color: white;
    }

    button[type="submit"]:hover{
      background: #1d4ed8;
    }

    button[type="reset"]{
      background: #e5e7eb;
      color: #111827;
    }

    button[type="reset"]:hover{
      background: #d1d5db;
    }

    @media(max-width: 700px){
      .name-group{
        grid-template-columns: 1fr;
      }

      .buttons{
        flex-direction: column;
      }

      .admission-form{
        padding: 25px;
      }
    }
  </style>
</head>
<body>
  <div class="admission-form">
    <h1> Muscle Gym Member Registration </h1>
    <form action="/submit" method="post">
      <p>Name</p>
      <label>
        <input type="text" id="name" name="nome" placeholder="First Name" required="required">
      </label>
        <input type="text" id="name" name="name" placeholder="LastName">
      </label>
      <p>Phone number</p>
      <label>
        <input type="tel" id="number" name="numero">
      </label>
      <p>Email</p>
      <label>
      <input type="email" id="email" name="email" required="required">
      </label>
      <p>Age</p>
      <label>
        <input type="number" id="age" name="idade">
      </label>
     <p>Date of birth</p> 
      <label>
        <input type="date" id="date">
      </label>
      <p>Gender</p>
      <label>
        <input type="radio" name="gender"value="male">Male
        <input type="radio" name="gender"value="female">Female
      </label>
      <p>Adress</p>
      <label>
        <textarea id="mensagem" cols="30" rows="30" name="mensagem">Digite seu texto aqui</textarea>
      </label>
      <fieldset>
        <legend>Membership Details</legend>
        Joining Date 
        <label>
                  <input type="date">
        </label>
<br>
        MemberShip Type:<br><br>
        <input type="radio" name="memberShip" value="basic">Basic (Gym)
        <input type="radio" name="memberShip" value="gold">
        <br>Gold (Gym + Cardio) 
        <input type="radio" name="memberShip" value="premium"> 
        Premium ( Gym + Cardio + Crossfit) <br>
        Duration <br>
        <select><br>
          <option value="1">1 Month</option>
          <option value="3">3 Months</option>
          <option value="6">6 Months</option>
          <option value="12">1 year</option>
        </select>
        <input type="checkbox" name="add-on" value="yogq">Yoga <input type="checkbox"> Free PT trail<input type="checkbox" name="add-on" value="zumba"> Zumba<input type="checkbox" name="add-on" value="piloxing"> Piloxing<input type="checkbox" name="add-on" value="diet"> Diet Plan
      </fieldset>
  
      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
  </div>
  
</body>
</html>
